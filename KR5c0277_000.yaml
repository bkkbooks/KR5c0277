front:
  text: 上清金書玉字上經夙八
  hash: sha256:24d41bc4cde3620609b67abaec32ed5d46cea2f7252a845be69bf318285d1622
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0277_HFL_000-001a, image: hfl/0581/0581-124.png}
body:
  text: 方諸宫青童君傳頭上真星兼思洞房神右足指帝星左足指尊星臨存時小屈左足以對於星也左手把北台右手執璇根密存祝訖而卧北斗中也行之九年除死上生名刻方諸府行之十八年九精來下雲車見迎璇根紐星之精名也北台元星之精名也卧息九斗之內心願飛仙上真廕庇華蓋之下白日乘雲登晨右二十四字太上刻峨嵋玉房東壁字文本古文不可解今出之青童有言作洞房面有三陽兩巳縱橫鼻為天山仰望明堂神關紫戶遂見洞房方圓璧立一寸正方靜存斗精來安其中照廕赤子無英三王乃成飛仙乘玄駕龍上造華辰驅使玉女玉童要道畢矣密奉密行方諸宫青蓋紫童始昔施行洞房偃息華辰卧起九精之內拘魂魄於北斗上是以號斗中真人也先師往受上清紫精君皇初紫虛君洞房上經青靈陽安君以傳中央黃老君三天太一元君即造太玄主仙府使定金書刻玉字名曰洞房上經玉皇以付後聖李彭二君使與骨命應得仙者按而行之列名元圖刻生除死飛行神仙謁為後君之官以佐來聖李彭二君於是二君以金書洞房經一通付西玄宫洞臺內諸得道真人以傳授當來成仙者於是二君以玉字洞房經一通付方諸宫及玄洲仙都府使教宿命骨名當得道者後聖二君乘太虛之輿浮遊十天九洞之門須期運告會乃治為帝理真官於神臺教種人於太平二君皆逆已察眄萬兆宿命善惡飛攬虛玄知學仙道士可成與難若心誠志專固慕神真者終年惓惓情無傾動靈鑒形骨已有仙名玉録者然後二君意同於是子乃得此書得書行者骨命已定玄閣録已有生名仙籍故也後聖二君常藏影匿端初不自傳但使因緣致往令彼其於遭值得此神經耳或書出凡庸或出於俗濁之人此輩雖有此經而不行也所以為人受隂教而使役也故骨命有仙分得書者多由歷因致以獲於此或遇真仙之人先受書期盡應出傳之年已審視形骨乃有授子者子其勤念飛仙坐起祝之於心行之久久子自得此經子不可謂書出非所卑賤之間而蔑其文輕其授矣此皆是後聖之玄命隂已處分應得道之審故與於子也今所宗奉所以承二君之意故敬及卑賤也亦如世間師主宗者皆致恭敬師主豈盡髙賢哉蓋逺宗其根心耳靜齋七日乃受此經修行謹戒奉而按之不得雜處穢俗殗亂之人密而行使不覺外同俗內鏡灼如是始可與言洞房之事也此龜山真母要訣以勑西城王君二十八宿仰繫於華辰管運于四方之神按四極四真之科法太上洞房金書玉字之信皆當立裂繒之誓為不妄泄之約也受得此經以青錦之帛三十二尺以奉有書者四方之數各八合三十二尺也有書得此帛又分以𧵥師如口訣若先受之於真仙迹絶無蹤者則所分𧵥無由而致受之乃為施散供道用可須者又不得以外供雜碎上皇告盟重用金青札所謂盟青帛也九素經曰子受金青上已刻石慎無他散以求冨榮斯其義也市此金帛每令上好者不可苟合以解責玄中亦當審子情狀矣此皆太上之書皆有定科初聽一百年得一傳七百年中得三傳過此不得復出傳非其人過限妄授皆為泄閉泄閉其祖父母以下受考三官身死天刑乃為下鬼王君云百年之內有二人可授者亦聽要以七百年內三傳為誓斗星者太極之紫蓋玄真之靈林九皇之神席天尊之宴房也子行其道位為仙宗得飛八景之龍上造太微出入紫庭宴息北斗飛旋洞關俯仰玄蓋呼吸華辰得乘流景以造三玄出入紫房遨遊太元名上金閣列為真人暮卧先存斗星在所卧席上令畫像按而存之如上法令我頭首九極使真氣入於泥丸足躡尊帝二星常心念飛仙令髙上拘我七魄太微制我三魂左手把北台右手執璇根行之十八年必色反嬰顔一旦忽有九星之精變成上帝九老之公並俱來下迎以玄景飛龍要以真鈴乘八輿瓊輪紫羽華蓋導以仙官前嘯鳯鳴後作天鈞翠衣青帶白日登晨玉童玉女乃為執巾暮卧常密三七叩齒咽液三七隂祝曰九星太精北極真君益我精胎強我三魂左引日華右拘月津辰中黃景元虛黃真使我飛仙上登紫煙神虎玉符常守生門萬邪伏法受鍊斗君平旦欲起常密二七叩齒咽液二七隂祝曰天元上一斗中七童上清紫精在兆身中華辰紫蓋太素玄宫後聖靈氣下入洞房使我飛仙得行太極金堂暮始卧存星之時皆先隂祝星名然後存星耳祝曰第一太星精名玄樞願某飛仙乘虛駕浮第二元星精名北台願某飛仙遊行洞臺第三真星精名九極上真願某飛仙得治三玄第四紐星精名璇根願某玉名列為飛仙第五綱星精名天平願某飛仙登行上清第六紀星精名命機願某飛仙名書太微第七關星精名玄陽願某飛仙得使玉童第八帝星精名髙上玉皇願某飛仙得登後聖之堂第九尊星精名太微帝君願某飛仙得入丹瑶玉房右九條以次祝畢乃存星而安卧斗中也然後又密叩齒咽液祝九星太精北極真君之説也所存所祝都畢良久乃存斗星之精忽然入洞房之中光照一身洞徹五內三關百節皆令赤光赫然祝曰洞房元精赤子太尊斗光華蓋來照泥丸保鍊骨血拘魄制魂使某飛仙乘雲登晨上朝玉帝太一元君都畢也所卧斗星之像但分精入於泥丸耳非又去此適彼之意也是為席上頭中兩處皆有耳青童君曰卧北斗隂精致仙使靈洞房致北斗陽精使五藏自生遂得乘景遊行上清如青童君之辭北斗有隂陽二精神也恐亦喻人之有魂魄二精矣北斗之星覆蓋華辰精輝九道光廕十天陽轉九九所以髙尊世人唯見七星而不見其二其第八第九皆是帝皇太尊之精神玄隱內鏡保制天魂靈光暐灼為此七星作鎮但不照於世間流俗榮名之人耳諸成道髙仙貴真及上清太清之官乃得見之見之皆不得妄道既見之後髙上玉皇太微帝君乃當詣子授子真官俗人跳脫亦有誤見此二星者見者慎勿言見也太上神録曰諸見北斗髙上太微一星皆增算三百年見二星增算六百年但俗人多穢未致於二尊來降耳此星乃大於七星光皆紫華有異於常煥煥甚可畏見者皆當拜叩頭請乞常以月三日二十七日夜竊候之勿令人知誠心久久無不見者星有三精故用二十七日也太上法諸妄説精名及見而泄者身被兵火卒而獲考地獄生死父母得罪三官秦時徐福本凡人也亦悟見二星乃不敢道遂得增年於是始信天下有仙乃知學道耳韓衆司馬季主及中嶽真人孟子卓張巨君逮尹軌之徒皆亦得見之者也漢相國霍光家有典衣奴子名還車粗知書曽見光嚴具中有短卷書云常以月三日二十七日使竊候北斗數數為之當有所見見而拜拜而請乞畢勿傳皆增年三百歲於是還車密識常試視之非一忽見二星在斗上光明非常乃拜而還還車遂得增年六百此奴小有意而無大志遂不學道唯盈年於未死耳此語出王君君以傳大茅君上清金書玉字上經
